name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # Fail only on high+ advisories in production deps; dev-only tooling
      # (type checker, formatter) is never shipped to visitors.
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run check
      - run: npm run format:check
      - run: npm run build
